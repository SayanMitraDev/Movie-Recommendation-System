
<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-xl">

    <h1 class="text-2xl font-bold mb-6 text-center">Movie Recommendation System</h1>

    <form method="POST" class="space-y-4">
        <select name="movie" class="w-full p-3 rounded bg-gray-700 text-white">
            {% for movie in movies %}
                <option value="{{ movie }}" {% if movie == selected %}selected{% endif %}>
                    {{ movie }}
                </option>
            {% endfor %}
        </select>

        <button class="w-full bg-blue-500 hover:bg-blue-600 p-3 rounded font-semibold">
            Get Recommendations
        </button>
    </form>

    {% if recommendations %}
        <div class="mt-6">
            <h2 class="text-lg font-semibold mb-2">Recommended Movies:</h2>
            <ul class="list-disc list-inside space-y-1">
                {% for movie in recommendations %}
                    <li>{{ movie }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}

</div>

</body>
</html>
